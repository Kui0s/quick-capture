<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>快速记录</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<style>
:root {
  --bg: #0f0f0f;
  --bg-card: #1a1a1a;
  --bg-input: #222;
  --text: #e8e8e8;
  --text-dim: #999;
  --text-muted: #666;
  --accent: #22d3a0;
  --accent-hover: #34d399;
  --danger: #ef4444;
  --border: #333;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { overscroll-behavior: none; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}
.screen { display: none; flex-direction: column; flex: 1; padding: 20px; padding-top: 16px; }
.screen.active { display: flex; }

/* ===== Header Bar ===== */
.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.header-bar h1 { font-size: 18px; font-weight: 700; }
.btn-icon {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  padding: 8px;
  cursor: pointer;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:active { background: var(--bg-card); }

/* ===== Settings Screen ===== */
#settings {
  justify-content: center;
  gap: 16px;
  max-width: 400px;
  margin: 0 auto;
  width: 100%;
}
#settings h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; color: var(--text-dim); font-weight: 500; }
.field input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-muted); }
.field .hint { font-size: 11px; color: var(--text-muted); }
.btn-primary {
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s;
}
.btn-primary:active { background: var(--accent-hover); }
.settings-note {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.5;
}
.field textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text);
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  min-height: 120px;
  max-height: 300px;
  outline: none;
  font-family: inherit;
  width: 100%;
}
.field textarea:focus { border-color: var(--accent); }
.btn-reset {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:active { background: var(--bg-card); color: var(--text-dim); }

/* ===== Input Screen ===== */
#input { gap: 12px; }
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-card);
}
.upload-zone:active { border-color: var(--accent); background: rgba(34,211,160,0.05); }
.upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
.upload-zone .label { font-size: 14px; color: var(--text-dim); }
.upload-zone .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.upload-zone input[type="file"] { display: none; }

.paste-btn {
  width: 100%;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.paste-btn:active { background: var(--bg-input); }

textarea {
  width: 100%;
  flex: 1;
  min-height: 160px;
  max-height: 45vh;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.7;
  resize: none;
  outline: none;
  font-family: inherit;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--text-muted); }
textarea:read-only { border-color: transparent; background: var(--bg); }

.btn-polish {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.btn-polish:active { opacity: 0.7; }
.btn-polish:disabled { opacity: 0.4; cursor: not-allowed; }

.batch-info {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  flex-shrink: 0;
}

/* ===== Review Screen ===== */
#review { gap: 12px; padding-top: 16px; }
.review-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.review-box {
  width: 100%;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 14px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  max-height: 38vh;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
.review-box.raw { color: var(--text-dim); font-size: 13px; max-height: 20vh; }
.review-box.polished h1, .review-box.polished h2, .review-box.polished h3 { margin: 10px 0 6px; }
.raw-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0;
}
.raw-toggle:active { color: var(--text-dim); }
.raw-section { display: none; }
.raw-section.show { display: block; }
.review-actions { display: flex; flex-direction: column; gap: 10px; }
.btn-action {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  text-align: center;
}
.btn-action:active { opacity: 0.7; }
.btn-save { background: var(--accent); color: #0f0f0f; }
.btn-copy { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); font-weight: 400; }
.btn-next { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }

/* ===== Loading ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,15,15,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 100;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-dim); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-card);
  color: var(--text);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  border: 1px solid var(--border);
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.success { border-color: var(--accent); color: var(--accent); }

/* ===== Error Banner ===== */
.error-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--danger);
  color: #fff;
  padding: 12px 16px;
  font-size: 13px;
  text-align: center;
  z-index: 300;
  transform: translateY(-100%);
  transition: transform 0.3s;
}
.error-banner.show { transform: translateY(0); }
</style>
</head>
<body>

<!-- Settings Screen -->
<div id="settings" class="screen active">
  <h2>快速记录</h2>
  <div class="field">
    <label>API Key</label>
    <input type="password" id="inp-key" placeholder="sk-ant-...">
    <span class="hint">在 <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent)">console.anthropic.com</a> 获取，密钥仅存本地</span>
  </div>
  <div class="field">
    <label>Obsidian 库名</label>
    <input type="text" id="inp-vault" placeholder="例如：MyVault">
    <span class="hint">在 Obsidian 设置 → 关于 中查看</span>
  </div>
  <div class="field">
    <label>保存文件夹（可选）</label>
    <input type="text" id="inp-folder" placeholder="例如：Quick Capture">
    <span class="hint">留空则保存到库根目录</span>
  </div>
  <div class="field">
    <label>AI 提示词</label>
    <textarea id="inp-prompt" rows="6"></textarea>
    <span class="hint">告诉 AI 如何处理你的文字稿。变量 <code style="color:var(--accent)">${today}</code> 会自动替换为当天日期，<code style="color:var(--accent)">${rawText}</code> 会替换为原始文本</span>
    <button class="btn-reset" id="btn-reset-prompt">重置为默认提示词</button>
  </div>
  <button class="btn-primary" id="btn-save-settings">保存设置</button>
  <div class="settings-note">设置保存在浏览器本地，不会发送到任何第三方服务器</div>
</div>

<!-- Input Screen -->
<div id="input" class="screen">
  <div class="header-bar">
    <h1>快速记录</h1>
    <button class="btn-icon" id="btn-settings" title="设置">&#9881;</button>
  </div>

  <div class="upload-zone" id="upload-zone">
    <div class="icon">&#128196;</div>
    <div class="label">点击上传通义听悟导出的文件</div>
    <div class="hint">支持 .docx / .txt</div>
    <input type="file" id="file-input" accept=".txt,.docx">
  </div>

  <button class="paste-btn" id="btn-paste">或从剪贴板粘贴文字</button>

  <textarea id="textarea" placeholder="上传文件或粘贴文字后，内容会显示在这里..."></textarea>

  <button class="btn-polish" id="btn-polish" disabled>AI 润色</button>

  <div class="batch-info" id="batch-info"></div>
</div>

<!-- Review Screen -->
<div id="review" class="screen">
  <div class="header-bar">
    <h1>润色结果</h1>
    <button class="btn-icon" id="btn-back-input" title="返回">&#8592;</button>
  </div>

  <div class="review-label">润色后</div>
  <div class="review-box polished" id="review-polished"></div>

  <button class="raw-toggle" id="raw-toggle">查看原始文本 &#9660;</button>
  <div class="raw-section" id="raw-section">
    <div class="review-label">原始文本</div>
    <div class="review-box raw" id="review-raw"></div>
  </div>

  <div class="review-actions">
    <button class="btn-action btn-save" id="btn-save">保存到 Obsidian</button>
    <button class="btn-action btn-copy" id="btn-copy">复制润色结果</button>
    <button class="btn-action btn-next" id="btn-next">继续下一条</button>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">AI 润色中...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Error Banner -->
<div class="error-banner" id="error-banner"></div>

<script>
(function() {
  const state = { rawText: '', polishedText: '', processedCount: 0 };
  const SETTINGS_KEY = 'quickcapture_settings';
  const HISTORY_KEY = 'quickcapture_history';

  const DEFAULT_PROMPT = `你是一个笔记润色助手。用户通过通义听悟转写了一段语音记录，请将其整理为结构清晰的 Markdown 笔记。

要求：
1. 保留原始思考的完整意思和个人风格
2. 修正转写可能的同音字错误、错别字和断句问题
3. 去除时间戳、发言人标签等转写格式痕迹
4. 适当分段，使用小标题组织内容
5. 在开头添加一个简短的标题（用 # 标记）
6. 在末尾添加日期：\${today}
7. 如果内容涉及多个主题，用 ## 分别组织
8. 不要添加原文中没有的观点或信息
9. 不要使用 emoji

原始转写文本：
---
\${rawText}
---`;

  const $ = id => document.getElementById(id);
  const screens = { settings: $('settings'), input: $('input'), review: $('review') };

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  // ===== Toast =====
  let toastTimer;
  function toast(msg, type) {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast ' + (type || '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ===== Error Banner =====
  let errorTimer;
  function showError(msg) {
    const el = $('error-banner');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(errorTimer);
    errorTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

  // ===== Settings =====
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
    catch { return {}; }
  }
  function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

  function initSettings() {
    const s = loadSettings();
    $('inp-key').value = s.apiKey || '';
    $('inp-vault').value = s.vaultName || '';
    $('inp-folder').value = s.defaultFolder || '';
    $('inp-prompt').value = s.customPrompt || DEFAULT_PROMPT;
  }

  $('btn-save-settings').addEventListener('click', () => {
    const apiKey = $('inp-key').value.trim();
    const vaultName = $('inp-vault').value.trim();
    if (!apiKey) { toast('请输入 API Key', 'error'); return; }
    if (!vaultName) { toast('请输入 Obsidian 库名', 'error'); return; }
    saveSettings({
      apiKey,
      vaultName,
      defaultFolder: $('inp-folder').value.trim(),
      customPrompt: $('inp-prompt').value.trim() || DEFAULT_PROMPT
    });
    toast('设置已保存', 'success');
    showScreen('input');
  });

  $('btn-settings').addEventListener('click', () => {
    initSettings();
    showScreen('settings');
  });

  $('btn-back-input').addEventListener('click', () => showScreen('input'));

  // ===== History =====
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }
  function saveHistory(list) { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }

  function addHistory(entry) {
    const list = loadHistory();
    list.unshift(entry);
    if (list.length > 20) list.length = 20;
    saveHistory(list);
  }

  // ===== File Upload =====
  const uploadZone = $('upload-zone');
  const fileInput = $('file-input');

  uploadZone.addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.style.borderColor = 'var(--accent)';
  });
  uploadZone.addEventListener('dragleave', () => {
    uploadZone.style.borderColor = '';
  });
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.style.borderColor = '';
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
    fileInput.value = '';
  });

  async function handleFile(file) {
    const name = file.name.toLowerCase();
    if (name.endsWith('.txt')) {
      const text = await file.text();
      fillTextarea(text);
    } else if (name.endsWith('.docx')) {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        fillTextarea(result.value);
      } catch (e) {
        showError('docx 解析失败: ' + e.message);
      }
    } else {
      showError('不支持的文件格式，请使用 .txt 或 .docx');
    }
  }

  function fillTextarea(text) {
    $('textarea').value = text;
    $('btn-polish').disabled = !text.trim();
  }

  // ===== Paste Button =====
  $('btn-paste').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.trim()) {
        fillTextarea(text);
        toast('已粘贴', 'success');
      } else {
        toast('剪贴板为空', 'error');
      }
    } catch (e) {
      toast('无法读取剪贴板，请手动粘贴', 'error');
    }
  });

  // ===== Textarea input =====
  $('textarea').addEventListener('input', () => {
    $('btn-polish').disabled = !$('textarea').value.trim();
  });

  // ===== AI Polish =====
  $('btn-polish').addEventListener('click', () => {
    const text = $('textarea').value.trim();
    if (text) polishText(text);
  });

  async function polishText(rawText) {
    const settings = loadSettings();
    if (!settings.apiKey) {
      showScreen('settings');
      initSettings();
      showError('请先设置 API Key');
      return;
    }

    $('loading').classList.add('active');

    const today = new Date().toISOString().split('T')[0];
    const settings2 = loadSettings();
    const promptTemplate = settings2.customPrompt || DEFAULT_PROMPT;
    const prompt = promptTemplate.replace(/\$\{today\}/g, today).replace(/\$\{rawText\}/g, rawText);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2048,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err.error?.message || `HTTP ${response.status}`;
        if (response.status === 401) throw new Error('API Key 无效，请在设置中检查');
        if (response.status === 429) throw new Error('API 配额用完，请稍后再试');
        throw new Error(msg);
      }

      const data = await response.json();
      state.polishedText = data.content[0].text;
      state.rawText = rawText;
      state.processedCount++;
      showReview();
    } catch (error) {
      showError('AI 润色失败: ' + error.message);
    }

    $('loading').classList.remove('active');
  }

  function showReview() {
    $('review-raw').textContent = state.rawText;
    $('review-polished').innerHTML = renderMarkdown(state.polishedText);
    $('raw-section').classList.remove('show');
    $('raw-toggle').innerHTML = '查看原始文本 &#9660;';
    updateBatchInfo();
    showScreen('review');
  }

  function renderMarkdown(text) {
    return escapeHtml(text)
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ===== Raw Toggle =====
  $('raw-toggle').addEventListener('click', () => {
    const section = $('raw-section');
    const isShow = section.classList.toggle('show');
    $('raw-toggle').innerHTML = isShow
      ? '收起原始文本 &#9650;'
      : '查看原始文本 &#9660;';
  });

  // ===== Batch Info =====
  function updateBatchInfo() {
    $('batch-info').textContent = state.processedCount > 0
      ? `已处理 ${state.processedCount} 条`
      : '';
  }

  // ===== Save to Obsidian =====
  async function saveToObsidian() {
    const settings = loadSettings();
    const title = extractTitle(state.polishedText) || generateTitle();
    const folder = settings.defaultFolder || '';
    const path = folder ? `${folder}/${title}` : title;

    const noteContent = `---
created: ${new Date().toISOString().split('T')[0]}
source: quick-capture
---

${state.polishedText}`;

    // Tier 1: Obsidian URI
    const uri = `obsidian://new?vault=${encodeURIComponent(settings.vaultName)}&name=${encodeURIComponent(path)}&content=${encodeURIComponent(noteContent)}`;
    if (uri.length < 2000) {
      try {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = uri;
        document.body.appendChild(iframe);
        setTimeout(() => iframe.remove(), 3000);
        addHistory({ title, rawText: state.rawText, polishedText: state.polishedText, timestamp: Date.now() });
        toast('已保存到 Obsidian', 'success');
        return;
      } catch(e) {}
    }

    // Tier 2: Web Share
    if (navigator.share) {
      try {
        await navigator.share({ title, text: noteContent });
        addHistory({ title, rawText: state.rawText, polishedText: state.polishedText, timestamp: Date.now() });
        toast('已分享', 'success');
        return;
      } catch(e) {}
    }

    // Tier 3: Clipboard
    await copyToClipboard(noteContent);
    addHistory({ title, rawText: state.rawText, polishedText: state.polishedText, timestamp: Date.now() });
    toast('已复制到剪贴板，请粘贴到 Obsidian', 'success');
  }

  function extractTitle(text) {
    const m = text.match(/^#\s+(.+)$/m);
    return m ? m[1].trim() : null;
  }

  function generateTitle() {
    const d = new Date();
    return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 语音记录`;
  }

  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
  }

  // ===== Event Bindings =====
  $('btn-save').addEventListener('click', saveToObsidian);
  $('btn-copy').addEventListener('click', () => {
    copyToClipboard(state.polishedText).then(() => toast('已复制'));
  });
  $('btn-next').addEventListener('click', () => {
    $('textarea').value = '';
    $('btn-polish').disabled = true;
    updateBatchInfo();
    showScreen('input');
  });
  $('btn-reset-prompt').addEventListener('click', () => {
    $('inp-prompt').value = DEFAULT_PROMPT;
    toast('已重置为默认提示词', 'success');
  });

  // ===== Init =====
  const settings = loadSettings();
  if (settings.apiKey && settings.vaultName) {
    showScreen('input');
  } else {
    initSettings();
  }

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
