<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>快速记录</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0f0f0f;
  --bg-card: #1a1a1a;
  --bg-input: #222;
  --text: #e8e8e8;
  --text-dim: #999;
  --text-muted: #666;
  --accent: #22d3a0;
  --accent-hover: #34d399;
  --danger: #ef4444;
  --border: #333;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { overscroll-behavior: none; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}
.screen { display: none; flex-direction: column; flex: 1; padding: 20px; }
.screen.active { display: flex; }

/* ===== Settings Screen ===== */
#settings {
  justify-content: center;
  gap: 16px;
  max-width: 400px;
  margin: 0 auto;
  width: 100%;
}
#settings h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; color: var(--text-dim); font-weight: 500; }
.field input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-muted); }
.field .hint { font-size: 11px; color: var(--text-muted); }
.btn-primary {
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s;
}
.btn-primary:active { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.settings-note {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.5;
}

/* ===== Idle Screen ===== */
#idle { align-items: center; justify-content: center; gap: 24px; }
.idle-top { position: absolute; top: 16px; right: 16px; }
.btn-icon {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  padding: 8px;
  cursor: pointer;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:active { background: var(--bg-card); }
.record-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.mic-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 3px solid var(--accent);
  color: var(--accent);
  font-size: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
}
.mic-btn:active { transform: scale(0.95); }
.mic-btn svg { width: 36px; height: 36px; fill: var(--accent); }
.idle-hint { font-size: 14px; color: var(--text-dim); }
.recent-section { width: 100%; max-width: 400px; }
.recent-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.recent-item {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.recent-item:active { background: var(--bg-input); }
.recent-item .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-item .time { font-size: 11px; color: var(--text-muted); }

/* ===== Recording Screen ===== */
#recording { align-items: center; justify-content: center; gap: 20px; }
.rec-indicator {
  font-size: 14px;
  color: var(--danger);
  display: flex;
  align-items: center;
  gap: 8px;
}
.rec-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--danger);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}
.rec-timer { font-size: 32px; font-weight: 300; font-variant-numeric: tabular-nums; color: var(--text); }
.rec-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--danger);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.rec-btn:active { transform: scale(0.9); }
.rec-btn-inner {
  width: 24px;
  height: 24px;
  background: #fff;
  border-radius: 4px;
}
.transcript-box {
  width: 100%;
  max-width: 400px;
  flex: 1;
  min-height: 120px;
  max-height: 50vh;
  overflow-y: auto;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  word-break: break-all;
}
.transcript-box .interim { color: var(--text-muted); }
.transcript-empty { color: var(--text-muted); font-style: italic; }

/* ===== Review Screen ===== */
#review { align-items: center; gap: 16px; padding-top: 24px; }
.review-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; align-self: flex-start; }
.review-box {
  width: 100%;
  max-width: 400px;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  max-height: 35vh;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
.review-box.raw { color: var(--text-dim); font-size: 13px; }
.review-box.polished { color: var(--text); }
.review-box.polished h1, .review-box.polished h2 { margin: 12px 0 6px; }
.review-actions { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
.btn-action {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  text-align: center;
}
.btn-action:active { opacity: 0.7; }
.btn-save { background: var(--accent); color: #0f0f0f; }
.btn-share { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-copy { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); font-weight: 400; }
.btn-redo { background: none; color: var(--text-muted); font-weight: 400; font-size: 13px; }

/* ===== Loading ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,15,15,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 100;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-dim); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-card);
  color: var(--text);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  border: 1px solid var(--border);
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.success { border-color: var(--accent); color: var(--accent); }

/* ===== Error Banner ===== */
.error-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--danger);
  color: #fff;
  padding: 12px 16px;
  font-size: 13px;
  text-align: center;
  z-index: 300;
  transform: translateY(-100%);
  transition: transform 0.3s;
}
.error-banner.show { transform: translateY(0); }
</style>
</head>
<body>

<!-- Settings Screen -->
<div id="settings" class="screen active">
  <h2>快速记录</h2>
  <div class="field">
    <label>API Key</label>
    <input type="password" id="inp-key" placeholder="sk-ant-...">
    <span class="hint">在 <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent)">console.anthropic.com</a> 获取，密钥仅存本地</span>
  </div>
  <div class="field">
    <label>Obsidian 库名</label>
    <input type="text" id="inp-vault" placeholder="例如：MyVault">
    <span class="hint">在 Obsidian 设置 → 关于 中查看</span>
  </div>
  <div class="field">
    <label>保存文件夹（可选）</label>
    <input type="text" id="inp-folder" placeholder="例如：Quick Capture">
    <span class="hint">留空则保存到库根目录</span>
  </div>
  <button class="btn-primary" id="btn-save-settings">保存设置</button>
  <div class="settings-note">设置保存在浏览器本地，不会发送到任何第三方服务器</div>
</div>

<!-- Idle Screen -->
<div id="idle" class="screen">
  <div class="idle-top">
    <button class="btn-icon" id="btn-settings" title="设置">&#9881;</button>
  </div>
  <div class="record-area">
    <button class="mic-btn" id="btn-start">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <span class="idle-hint">点击开始录音</span>
  </div>
  <div class="recent-section" id="recent-section" style="display:none">
    <div class="recent-title">最近记录</div>
    <div id="recent-list"></div>
  </div>
</div>

<!-- Recording Screen -->
<div id="recording" class="screen">
  <div class="rec-indicator"><span class="rec-dot"></span> 正在聆听...</div>
  <div class="rec-timer" id="rec-timer">00:00</div>
  <button class="rec-btn" id="btn-stop">
    <div class="rec-btn-inner"></div>
  </button>
  <div class="transcript-box" id="transcript-box">
    <span class="transcript-empty">等待语音输入...</span>
  </div>
</div>

<!-- Review Screen -->
<div id="review" class="screen">
  <div class="review-label">润色后</div>
  <div class="review-box polished" id="review-polished">处理中...</div>
  <div class="review-label">原始文本</div>
  <div class="review-box raw" id="review-raw"></div>
  <div class="review-actions">
    <button class="btn-action btn-save" id="btn-save">保存到 Obsidian</button>
    <button class="btn-action btn-share" id="btn-share">分享</button>
    <button class="btn-action btn-copy" id="btn-copy">复制到剪贴板</button>
    <button class="btn-action btn-redo" id="btn-redo">重新录音</button>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">AI 润色中...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Error Banner -->
<div class="error-banner" id="error-banner"></div>

<script>
(function() {
  // ===== State =====
  const state = {
    rawText: '',
    polishedText: '',
    isRecording: false,
    timerInterval: null,
    seconds: 0,
    recognition: null
  };

  const SETTINGS_KEY = 'quickcapture_settings';
  const HISTORY_KEY = 'quickcapture_history';

  // ===== Elements =====
  const $ = id => document.getElementById(id);
  const screens = { settings: $('settings'), idle: $('idle'), recording: $('recording'), review: $('review') };

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  // ===== Toast =====
  let toastTimer;
  function toast(msg, type) {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast ' + (type || '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ===== Error Banner =====
  let errorTimer;
  function showError(msg) {
    const el = $('error-banner');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(errorTimer);
    errorTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

  // ===== Settings =====
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
    catch { return {}; }
  }
  function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

  function initSettings() {
    const s = loadSettings();
    $('inp-key').value = s.apiKey || '';
    $('inp-vault').value = s.vaultName || '';
    $('inp-folder').value = s.defaultFolder || '';
  }

  $('btn-save-settings').addEventListener('click', () => {
    const apiKey = $('inp-key').value.trim();
    const vaultName = $('inp-vault').value.trim();
    if (!apiKey) { toast('请输入 API Key', 'error'); return; }
    if (!vaultName) { toast('请输入 Obsidian 库名', 'error'); return; }
    saveSettings({
      apiKey,
      vaultName,
      defaultFolder: $('inp-folder').value.trim()
    });
    toast('设置已保存', 'success');
    showScreen('idle');
    loadRecent();
  });

  $('btn-settings').addEventListener('click', () => {
    initSettings();
    showScreen('settings');
  });

  // ===== History =====
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }
  function saveHistory(list) { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }

  function addHistory(entry) {
    const list = loadHistory();
    list.unshift(entry);
    if (list.length > 10) list.length = 10;
    saveHistory(list);
  }

  function loadRecent() {
    const list = loadHistory();
    const section = $('recent-section');
    const container = $('recent-list');
    if (!list.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    container.innerHTML = list.slice(0, 5).map((item, i) => {
      const preview = (item.polishedText || item.rawText || '').replace(/[#*\n]/g, ' ').slice(0, 60);
      const time = item.timestamp ? new Date(item.timestamp).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
      return `<div class="recent-item" data-idx="${i}">
        <div class="title">${escapeHtml(preview)}</div>
        <div class="time">${time}</div>
      </div>`;
    }).join('');
    container.querySelectorAll('.recent-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        const item = list[idx];
        if (item) {
          state.rawText = item.rawText || '';
          state.polishedText = item.polishedText || '';
          showReview();
        }
      });
    });
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== Voice Recording =====
  function startRecording() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showError('当前浏览器不支持语音识别，请使用 Chrome');
      return;
    }

    state.rawText = '';
    state.seconds = 0;
    $('rec-timer').textContent = '00:00';
    $('transcript-box').innerHTML = '<span class="transcript-empty">等待语音输入...</span>';

    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
      let interim = '';
      let finalText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalText += t;
        } else {
          interim += t;
        }
      }
      if (finalText) state.rawText += finalText;
      updateTranscript(interim);
    };

    recognition.onend = () => {
      if (state.isRecording) {
        setTimeout(() => {
          if (state.isRecording) {
            try { recognition.start(); } catch(e) {}
          }
        }, 80);
      }
    };

    recognition.onerror = (event) => {
      if (event.error === 'no-speech' || event.error === 'aborted') return;
      if (event.error === 'not-allowed') {
        showError('请在浏览器设置中允许麦克风权限');
        stopRecording();
        return;
      }
      console.error('Speech error:', event.error);
    };

    state.recognition = recognition;
    state.isRecording = true;
    recognition.start();
    showScreen('recording');
    startTimer();
  }

  function stopRecording() {
    state.isRecording = false;
    if (state.recognition) {
      state.recognition.onend = null;
      try { state.recognition.stop(); } catch(e) {}
      state.recognition = null;
    }
    stopTimer();
  }

  function updateTranscript(interim) {
    const box = $('transcript-box');
    let html = escapeHtml(state.rawText);
    if (interim) html += '<span class="interim">' + escapeHtml(interim) + '</span>';
    if (!html) html = '<span class="transcript-empty">等待语音输入...</span>';
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
  }

  function startTimer() {
    state.timerInterval = setInterval(() => {
      state.seconds++;
      const m = String(Math.floor(state.seconds / 60)).padStart(2, '0');
      const s = String(state.seconds % 60).padStart(2, '0');
      $('rec-timer').textContent = m + ':' + s;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }

  // ===== AI Polish =====
  async function polishText(rawText) {
    const settings = loadSettings();
    if (!settings.apiKey) {
      showScreen('settings');
      initSettings();
      showError('请先设置 API Key');
      return;
    }

    $('loading').classList.add('active');
    $('loading').querySelector('.loading-text').textContent = 'AI 润色中...';

    const today = new Date().toISOString().split('T')[0];
    const prompt = `你是一个笔记润色助手。用户通过语音输入了一段原始想法，请将其整理为结构清晰的 Markdown 笔记。

要求：
1. 保留原始思考的完整意思和个人风格
2. 修正语音识别可能的错别字和断句问题
3. 适当分段，使用小标题组织内容
4. 在开头添加一个简短的标题（用 # 标记）
5. 在末尾添加日期：${today}
6. 如果内容涉及多个主题，用 ## 分别组织
7. 不要添加原文中没有的观点或信息
8. 不要使用 emoji

原始语音文本：
---
${rawText}
---`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2048,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err.error?.message || `HTTP ${response.status}`;
        if (response.status === 401) throw new Error('API Key 无效，请在设置中检查');
        if (response.status === 429) throw new Error('API 配额用完，请稍后再试');
        throw new Error(msg);
      }

      const data = await response.json();
      state.polishedText = data.content[0].text;
    } catch (error) {
      state.polishedText = state.rawText;
      showError('AI 润色失败: ' + error.message);
    }

    $('loading').classList.remove('active');
    showReview();
  }

  function showReview() {
    $('review-raw').textContent = state.rawText;
    // Render markdown simply: convert # headers to styled text
    $('review-polished').innerHTML = renderSimpleMarkdown(state.polishedText);
    showScreen('review');
  }

  function renderSimpleMarkdown(text) {
    return escapeHtml(text)
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  // ===== Save to Obsidian =====
  async function saveToObsidian() {
    const settings = loadSettings();
    const title = extractTitle(state.polishedText) || generateTitle();
    const folder = settings.defaultFolder || '';
    const path = folder ? `${folder}/${title}` : title;

    const noteContent = `---
created: ${new Date().toISOString().split('T')[0]}

    const uri = `obsidian://new?vault=${encodeURIComponent(settings.vaultName)}&name=${encodeURIComponent(path)}&content=${encodeURIComponent(noteContent)}`;
    if (uri.length < 2000) {
      try {
        const iframe = document.createElement('iframe');

        iframe.src = uri;
        document.body.appendChild(iframe);

    // Tier 2: Web Share
    if (navigator.share) {
      try {

  function extractTitle(text) {
    const m = text.match(/^#\s+(.+)$/m);
    return m ? m[1].trim() : null;
  }

  function generateTitle() {
    const d = new Date();
    return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 语音记录`;
  }

  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      return true;
    }
  }

  // ===== Event Bindings =====
  $('btn-start').addEventListener('click', startRecording);
  $('btn-stop').addEventListener('click', () => {
    stopRecording();
    if (state.rawText.trim()) {
      polishText(state.rawText.trim());
    } else {
      toast('没有录入到内容', 'error');
      showScreen('idle');
    }
  });
  $('btn-save').addEventListener('click', saveToObsidian);
  $('btn-share').addEventListener('click', async () => {
    if (navigator.share) {
      try { await navigator.share({ text: state.polishedText }); } catch(e) {}
    } else {
      await copyToClipboard(state.polishedText);
      toast('已复制到剪贴板');
    }
  });
  $('btn-copy').addEventListener('click', () => {
    copyToClipboard(state.polishedText).then(() => toast('已复制'));
  });
  $('btn-redo').addEventListener('click', () => {
    startRecording();
  });

  // ===== Init =====
  const settings = loadSettings();
  if (settings.apiKey && settings.vaultName) {
    showScreen('idle');
    loadRecent();
  } else {
    initSettings();
  }

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
</script>
